<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Tenue Rayons</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#17181A;
  --panel:#202124;
  --panel-raised:#2A2C30;
  --line:#34363B;
  --text:#F4F3EF;
  --muted:#8C8E94;
  --brand:#FFB020;
  --brand-dim:#8A5E12;
  --ok:#2FBF71;
  --warn:#FF8A3D;
  --danger:#FF4D5E;
  --font-display:'Archivo Black', sans-serif;
  --font-body:'Barlow', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
body{min-height:100vh; padding-bottom:env(safe-area-inset-bottom);}
button{font-family:inherit; cursor:pointer;}
input{font-family:inherit;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:10;}
.topbar .brand{font-family:var(--font-display);font-size:15px;letter-spacing:0.5px;color:var(--brand);}
.topbar .who{font-size:12px;color:var(--muted);text-align:right;line-height:1.3;}
.topbar .back{background:none;border:none;color:var(--text);font-size:22px;padding:4px 8px;margin:-4px -8px;}

.screen{padding:18px;flex:1;display:flex;flex-direction:column;gap:14px;}
.center-screen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:stretch;padding:28px;gap:18px;}

h1.hero{font-family:var(--font-display);font-size:26px;line-height:1.15;margin:0 0 4px;}
h1.hero .accent{color:var(--brand);}
p.sub{color:var(--muted);font-size:14px;margin:0;line-height:1.5;}

.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:600;}
.field input, .field select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:14px;border-radius:10px;font-size:16px;}
.field input:focus, .field select:focus{outline:2px solid var(--brand);border-color:var(--brand);}

.pin-dots{display:flex;gap:14px;justify-content:center;margin:6px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);}
.pin-dot.filled{background:var(--brand);border-color:var(--brand);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.keypad button{background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--font-mono);font-size:22px;font-weight:700;padding:18px 0;border-radius:12px;}
.keypad button:active{background:var(--panel-raised);}
.keypad button.wipe{color:var(--danger);font-family:var(--font-body);font-size:14px;font-weight:600;}
.keypad button.empty{background:transparent;border:none;}

.btn{display:block;width:100%;text-align:center;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:var(--font-body);letter-spacing:0.2px;}
.btn-primary{background:var(--brand);color:#1A1200;}
.btn-primary:active{background:#e6a01c;}
.btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--line);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-sm{padding:10px;font-size:13px;border-radius:9px;}
.btn:disabled{opacity:0.4;}

.userlist{display:flex;flex-direction:column;gap:8px;}
.user-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
.user-row .name{font-weight:600;font-size:15px;}
.user-row .store-badge{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.5px;margin-top:2px;}
.chev{color:var(--muted);font-size:18px;}

.tag-role{font-family:var(--font-mono);font-size:10px;padding:3px 7px;border-radius:5px;letter-spacing:0.5px;text-transform:uppercase;font-weight:700;}
.tag-role.manager{background:#2A2C30;color:var(--brand);}
.tag-role.direction{background:#2A2C30;color:#4DA3FF;}

.mode-toggle{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;}
.mode-toggle button{flex:1;background:none;border:none;color:var(--muted);padding:11px 0;border-radius:9px;font-size:13px;font-weight:700;font-family:var(--font-body);}
.mode-toggle button.active{background:var(--brand);color:#1A1200;}

.progress-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
.progress-wrap .label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;}
.progress-bar{height:6px;background:var(--panel-raised);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--brand);border-radius:4px;transition:width .3s;}

.week-strip{display:flex;gap:6px;}
.week-day{flex:1;text-align:center;padding:8px 2px;border-radius:8px;background:var(--panel);border:1px solid var(--line);}
.week-day .d{font-size:10px;color:var(--muted);text-transform:uppercase;}
.week-day .dot{width:6px;height:6px;border-radius:50%;margin:5px auto 0;background:var(--line);}
.week-day.done .dot{background:var(--ok);}
.week-day.today{border-color:var(--brand);}

.rayon-card{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:10px;padding:14px 14px;}
.rayon-card.status-ok{border-left-color:var(--ok);}
.rayon-card.status-warn{border-left-color:var(--warn);}
.rayon-card.status-danger{border-left-color:var(--danger);}
.rayon-card .rname{font-weight:600;font-size:14.5px;}
.rayon-card .rmeta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:3px;}
.rayon-card .rright{display:flex;align-items:center;gap:8px;}
.dots{display:flex;gap:4px;}
.dots .dd{width:6px;height:6px;border-radius:50%;background:var(--line);}
.dots .dd.on{background:var(--brand);}

.counter-block{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;}
.counter-block .clabel{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.counter-block .clabel .hint{font-weight:400;color:var(--muted);font-size:11px;}
.counter-row{display:flex;align-items:center;justify-content:center;gap:18px;}
.cbtn{width:52px;height:52px;border-radius:50%;background:var(--panel-raised);border:1px solid var(--line);color:var(--text);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.cbtn:active{background:var(--brand);color:#1A1200;}
.cval{font-family:var(--font-mono);font-size:34px;font-weight:700;min-width:64px;text-align:center;}

.photo-row{display:flex;gap:10px;flex-wrap:wrap;}
.photo-thumb{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--line);}
.photo-add{width:64px;height:64px;border-radius:10px;background:var(--panel);border:1px dashed var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:22px;}

textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);padding:12px;border-radius:10px;font-family:var(--font-body);font-size:14px;resize:vertical;min-height:64px;}

.tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);padding:4px;border-radius:10px;}
.tabs button{flex:1;background:none;border:none;color:var(--muted);padding:9px 0;border-radius:7px;font-size:12.5px;font-weight:700;}
.tabs button.active{background:var(--panel-raised);color:var(--brand);}

.report-table{display:flex;flex-direction:column;gap:6px;}
.rt-head{display:grid;grid-template-columns:1.3fr .6fr .6fr .6fr .6fr .6fr;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;padding:0 10px;font-weight:700;}
.rt-row{display:grid;grid-template-columns:1.3fr .6fr .6fr .6fr .6fr .6fr;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px;font-family:var(--font-mono);font-size:12px;}
.rt-row .rn{font-family:var(--font-body);font-weight:600;font-size:12.5px;grid-column:1;}
.rt-cell{text-align:center;font-weight:700;}
.rt-cell.zero{color:var(--muted);font-weight:400;}
.rt-cell.warn{color:var(--warn);}
.rt-cell.danger{color:var(--danger);}
.rt-meta{font-size:10px;color:var(--muted);margin-top:2px;grid-column:1;font-family:var(--font-body);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel-raised);border:1px solid var(--brand);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4);}

.footer-actions{position:sticky;bottom:0;background:var(--bg);padding:14px 18px;padding-bottom:calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);}

</style>
</head>
<body>
<div id="app"></div>
<script>

// ---------- CONFIG ----------
const RAYONS = [
  {id:'literie', label:'Literie'},
  {id:'petit-meuble', label:'Petit meuble / rangement'},
  {id:'chambre-adulte', label:'Chambre adulte'},
  {id:'chambre-enfant', label:'Chambre enfant'},
  {id:'petit-electro', label:'Petit électroménager'},
  {id:'gros-electro', label:'Gros électroménager'},
  {id:'television', label:'Télévision'},
  {id:'hifi', label:'HIFI'},
  {id:'table-basse', label:'Table basse / MTV'},
  {id:'canape', label:'Canapé'},
  {id:'salle-a-manger', label:'Salle à manger'},
  {id:'decoration', label:'Décoration'},
  {id:'table-chaises', label:'Table & chaises'},
  {id:'bureau', label:'Bureau + fauteuil de bureau'},
];
const STORES = [
  {id:'nord', label:'Magasin Nord'},
  {id:'sud', label:'Magasin Sud'},
];
const FIELDS = [
  {id:'trous', label:'Trous visibles', hint:'emplacements vides'},
  {id:'cartons', label:'Produits en carton', hint:'pas encore en rayon'},
  {id:'a_monter', label:'Choses à monter', hint:'meubles à assembler'},
  {id:'prix_manquants', label:'Prix manquants', hint:'étiquettes absentes'},
  {id:'plv_manquante', label:'Signalétique / PLV manquante', hint:'affichage, panneaux, promo'},
];

// ---------- STATE ----------
let state = {
  screen: 'loading',
  users: [],
  loginTarget: null,
  pinBuffer: '',
  registerDraft: {name:'', store:'nord', role:'manager', pin:''},
  currentUser: null,
  mode: 'quotidien', // quotidien | hebdo
  today: todayStr(),
  weekStatus: {},
  currentEntries: {}, // rayonId -> record for currentUser.store + today
  activeRayon: null,
  draft: null, // working copy of counts/note/photos for activeRayon
  reportStore: 'nord',
  reportDate: todayStr(),
  reportEntries: {},
  toast: null,
};

function todayStr(d){
  const dt = d || new Date();
  return dt.toISOString().slice(0,10);
}
function fmtDate(s){
  const [y,m,d]=s.split('-');
  return `${d}/${m}/${y}`;
}
function weekdayLabel(dt){
  return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][dt.getDay()];
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const el = SCREENS[state.screen] ? SCREENS[state.screen]() : document.createTextNode('');
  app.appendChild(el);
  if(state.toast){
    const t = document.createElement('div');
    t.className='toast';
    t.textContent = state.toast;
    app.appendChild(t);
    setTimeout(()=>{ state.toast=null; const tt=document.querySelector('.toast'); if(tt) tt.remove(); }, 2200);
  }
}
function showToast(msg){ state.toast = msg; const app=document.getElementById('app'); let t=document.querySelector('.toast'); if(t) t.remove(); t=document.createElement('div'); t.className='toast'; t.textContent=msg; app.appendChild(t); setTimeout(()=>{ if(t) t.remove(); },2200); }

function h(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if(k==='html') e.innerHTML = attrs[k];
    else if(typeof attrs[k] === 'boolean'){ if(attrs[k]) e.setAttribute(k, ''); }
    else e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

// ---------- STORAGE HELPERS (API Next.js / Upstash) ----------
async function loadUsers(){
  try{
    const r = await fetch('/api/users');
    state.users = r.ok ? await r.json() : [];
  }catch(e){ state.users = []; }
}
async function saveUsers(){
  try{ await fetch('/api/users', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(state.users)}); }
  catch(e){ showToast('Erreur de sauvegarde'); }
}
async function loadEntriesFor(store, date){
  try{
    const r = await fetch(`/api/entries?store=${encodeURIComponent(store)}&date=${encodeURIComponent(date)}`);
    return r.ok ? await r.json() : {};
  }catch(e){ return {}; }
}
async function saveEntriesFor(store, date, obj){
  try{
    await fetch('/api/entries', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({store, date, entries: obj})});
    return true;
  }catch(e){ showToast('Erreur de sauvegarde'); return false; }
}
async function savePhoto(store, date, rayonId, dataUrl){
  const id = `${store}:${date}:${rayonId}:${Date.now()}`;
  try{
    await fetch('/api/photo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, dataUrl})});
    return id;
  }catch(e){ return null; }
}
async function loadPhoto(id){
  try{
    const r = await fetch(`/api/photo?id=${encodeURIComponent(id)}`);
    if(!r.ok) return null;
    const data = await r.json();
    return data.dataUrl || null;
  }catch(e){ return null; }
}

function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 480;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.55));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- SEVERITY ----------
function recTotal(rec){
  if(!rec) return 0;
  return (rec.trous||0)+(rec.cartons||0)+(rec.a_monter||0)+(rec.prix_manquants||0)+(rec.plv_manquante||0);
}
function severity(rec){
  if(!rec) return null;
  const total = recTotal(rec);
  if(total===0) return 'ok';
  if(total<=6) return 'warn';
  return 'danger';
}

// ---------- SCREENS ----------
const SCREENS = {};

SCREENS.loading = () => h('div',{class:'center-screen'}, [
  h('div',{style:'text-align:center;'},[
    h('div',{style:'font-family:var(--font-display);color:var(--brand);font-size:15px;letter-spacing:1px;'},['TENUE RAYONS']),
  ])
]);

SCREENS.login = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(h('h1',{class:'hero'},['Connexion']));
  wrap.appendChild(h('p',{class:'sub'},['Entre ton identifiant pour accéder au suivi des rayons.']));

  const nameField = h('div',{class:'field'},[
    h('label',{},['Identifiant (prénom)']),
    h('input',{type:'text', placeholder:'Ex: Karim', value: state.loginNameInput||'', oninput:(e)=>{ state.loginNameInput = e.target.value; }})
  ]);
  wrap.appendChild(nameField);

  wrap.appendChild(h('button',{class:'btn btn-primary', onclick:()=>{
    const typed = (state.loginNameInput||'').trim();
    if(!typed){ showToast('Entre ton identifiant'); return; }
    const match = state.users.find(u => u.name.trim().toLowerCase() === typed.toLowerCase());
    if(match){
      state.loginTarget = match;
      state.pinBuffer='';
      state.screen='pin-check';
    } else {
      state.registerDraft = {name: typed, store:'nord', role:'manager', pin:''};
      showToast('Profil introuvable \u2014 crée-le');
      state.screen='register';
    }
    render();
  }},['Continuer']));

  wrap.appendChild(h('button',{class:'btn btn-ghost', onclick:()=>{ state.registerDraft={name:'',store:'nord',role:'manager',pin:''}; state.screen='register'; render(); }},['+ Créer un profil']));
  return wrap;
};

SCREENS.register = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(h('button',{class:'back', onclick:()=>{ state.screen='login'; render(); }},['\u2190']));
  wrap.appendChild(h('h1',{class:'hero'},['Nouveau profil']));

  const nameField = h('div',{class:'field'},[
    h('label',{},['Prénom / nom']),
    h('input',{type:'text', placeholder:'Ex: Karim', value:state.registerDraft.name, oninput:(e)=>{ state.registerDraft.name=e.target.value; }})
  ]);

  const storeField = h('div',{class:'field'},[
    h('label',{},['Magasin']),
    h('select',{onchange:(e)=>{ state.registerDraft.store=e.target.value; }}, STORES.map(s=>h('option',{value:s.id, selected:s.id===state.registerDraft.store}, [s.label])))
  ]);

  const roleField = h('div',{class:'field'},[
    h('label',{},['Rôle']),
    h('select',{onchange:(e)=>{ state.registerDraft.role=e.target.value; }}, [
      h('option',{value:'manager', selected:state.registerDraft.role==='manager'},['Responsable de magasin']),
      h('option',{value:'direction', selected:state.registerDraft.role==='direction'},['Direction']),
    ])
  ]);

  wrap.appendChild(nameField);
  wrap.appendChild(storeField);
  wrap.appendChild(roleField);
  wrap.appendChild(h('p',{class:'sub'},['Tu vas ensuite définir un code à 4 chiffres pour retrouver ton profil rapidement.']));

  wrap.appendChild(h('button',{class:'btn btn-primary', onclick: async ()=>{
    if(!state.registerDraft.name.trim()){ showToast('Entre un prénom'); return; }
    state.screen='register-pin'; state.pinBuffer=''; render();
  }},['Continuer']));

  return wrap;
};

SCREENS['register-pin'] = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(h('button',{class:'back', onclick:()=>{ state.screen='register'; render(); }},['\u2190']));
  wrap.appendChild(h('h1',{class:'hero'},['Choisis ton code']));
  wrap.appendChild(h('p',{class:'sub'},['4 chiffres, à retenir pour te reconnecter.']));
  wrap.appendChild(pinDots());
  wrap.appendChild(keypad(async (digit)=>{
    if(digit==='wipe'){ state.pinBuffer = state.pinBuffer.slice(0,-1); render(); return; }
    if(state.pinBuffer.length>=4) return;
    state.pinBuffer += digit;
    if(state.pinBuffer.length===4){
      const newUser = {
        id: 'u_'+Date.now(),
        name: state.registerDraft.name.trim(),
        store: state.registerDraft.store,
        role: state.registerDraft.role,
        pin: state.pinBuffer,
      };
      state.users.push(newUser);
      await saveUsers();
      state.currentUser = newUser;
      try{ localStorage.setItem('tenueRayonsUserId', newUser.id); }catch(e){}
      state.pinBuffer='';
      await enterApp();
      return;
    }
    render();
  }));
  return wrap;
};

SCREENS['pin-check'] = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(h('button',{class:'back', onclick:()=>{ state.screen='login'; render(); }},['\u2190']));
  wrap.appendChild(h('h1',{class:'hero'},[state.loginTarget.name]));
  wrap.appendChild(h('p',{class:'sub'},['Entre ton code à 4 chiffres.']));
  wrap.appendChild(pinDots());
  wrap.appendChild(keypad(async (digit)=>{
    if(digit==='wipe'){ state.pinBuffer = state.pinBuffer.slice(0,-1); render(); return; }
    if(state.pinBuffer.length>=4) return;
    state.pinBuffer += digit;
    if(state.pinBuffer.length===4){
      if(state.pinBuffer === state.loginTarget.pin){
        state.currentUser = state.loginTarget;
        try{ localStorage.setItem('tenueRayonsUserId', state.loginTarget.id); }catch(e){}
        state.pinBuffer='';
        await enterApp();
      } else {
        showToast('Code incorrect');
        state.pinBuffer='';
        render();
      }
      return;
    }
    render();
  }));
  return wrap;
};

function pinDots(){
  const wrap = h('div',{class:'pin-dots'});
  for(let i=0;i<4;i++){
    wrap.appendChild(h('div',{class:'pin-dot' + (i<state.pinBuffer.length?' filled':'')}));
  }
  return wrap;
}
function keypad(onPress){
  const wrap = h('div',{class:'keypad'});
  ['1','2','3','4','5','6','7','8','9'].forEach(n=>{
    wrap.appendChild(h('button',{onclick:()=>onPress(n)},[n]));
  });
  wrap.appendChild(h('div',{class:'empty'}));
  wrap.appendChild(h('button',{onclick:()=>onPress('0')},['0']));
  wrap.appendChild(h('button',{class:'wipe', onclick:()=>onPress('wipe')},['\u2190']));
  return wrap;
}

async function enterApp(){
  if(state.currentUser.role==='direction'){
    state.reportStore = state.currentUser.store;
    state.reportDate = todayStr();
    state.reportEntries = await loadEntriesFor(state.reportStore, state.reportDate);
    state.screen = 'report';
    startReportPolling();
  } else {
    state.today = todayStr();
    state.currentEntries = await loadEntriesFor(state.currentUser.store, state.today);
    await loadWeekStatus();
    state.screen = 'home';
  }
  render();
}

function startReportPolling(){
  if(state.reportPollId) clearInterval(state.reportPollId);
  state.reportPollId = setInterval(async ()=>{
    if(state.screen !== 'report'){ clearInterval(state.reportPollId); state.reportPollId=null; return; }
    state.reportEntries = await loadEntriesFor(state.reportStore, state.reportDate);
    render();
  }, 15000);
}
function stopReportPolling(){
  if(state.reportPollId){ clearInterval(state.reportPollId); state.reportPollId=null; }
}

async function loadWeekStatus(){
  state.weekStatus = {};
  const now = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const ds = todayStr(d);
    const entries = await loadEntriesFor(state.currentUser.store, ds);
    state.weekStatus[ds] = Object.keys(entries).length>0;
  }
}

SCREENS.home = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(topbar(true));

  wrap.appendChild(h('h1',{class:'hero'},['Salut ', h('span',{class:'accent'},[state.currentUser.name.split(' ')[0]]), ' \u{1F44B}']));

  // week strip
  const strip = h('div',{class:'week-strip'});
  const now = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const ds = todayStr(d);
    const isToday = ds===state.today;
    const done = state.weekStatus[ds];
    strip.appendChild(h('div',{class:'week-day'+(done?' done':'')+(isToday?' today':'')},[
      h('div',{class:'d'},[weekdayLabel(d)]),
      h('div',{class:'dot'})
    ]));
  }
  wrap.appendChild(strip);

  // mode toggle
  const toggle = h('div',{class:'mode-toggle'},[
    h('button',{class: state.mode==='quotidien'?'active':'', onclick:()=>{ state.mode='quotidien'; render(); }},['Contr\u00F4le quotidien']),
    h('button',{class: state.mode==='hebdo'?'active':'', onclick:()=>{ state.mode='hebdo'; render(); }},['Bilan hebdomadaire']),
  ]);
  wrap.appendChild(toggle);

  const doneCount = RAYONS.filter(r => state.currentEntries[r.id] && (state.mode==='hebdo' ? state.currentEntries[r.id].type==='hebdo' : true)).length;
  const progress = h('div',{class:'progress-wrap'},[
    h('div',{class:'label'},[h('span',{},[state.mode==='hebdo'?'Bilan hebdomadaire':'Rayons vus aujourd\u2019hui']), h('span',{},[`${doneCount}/${RAYONS.length}`])]),
    h('div',{class:'progress-bar'},[h('div',{class:'progress-fill', style:`width:${(doneCount/RAYONS.length)*100}%`})])
  ]);
  wrap.appendChild(progress);

  const rayonList = h('div',{style:'display:flex;flex-direction:column;gap:8px;'});
  RAYONS.forEach(r=>{
    const rec = state.currentEntries[r.id];
    const sev = severity(rec);
    const card = h('div',{class:'rayon-card'+(sev?` status-${sev}`:''), onclick:()=>openRayon(r)},[
      h('div',{},[
        h('div',{class:'rname'},[r.label]),
        h('div',{class:'rmeta'},[ rec ? `${recTotal(rec)} pt\u00B7 ${rec.type==='hebdo'?'hebdo':'quotidien'}` : 'Pas encore fait' ])
      ]),
      h('div',{class:'rright'},[
        h('span',{class:'chev'},['\u203A'])
      ])
    ]);
    rayonList.appendChild(card);
  });
  wrap.appendChild(rayonList);

  return wrap;
};

function topbar(showLogout){
  const store = STORES.find(s=>s.id===state.currentUser.store);
  return h('div',{class:'topbar'},[
    h('div',{class:'brand'},['TENUE RAYONS']),
    h('div',{class:'who', onclick: showLogout ? ()=>{ stopReportPolling(); state.editDraft = JSON.parse(JSON.stringify(state.currentUser)); state.screen='account'; render(); } : null},[
      h('div',{},[store?store.label:'']),
      h('div',{style:'color:var(--brand);'},[showLogout ? state.currentUser.name+' \u2699' : ''])
    ])
  ]);
}

function openRayon(r){
  const existing = state.currentEntries[r.id];
  state.activeRayon = r;
  state.draft = existing ? JSON.parse(JSON.stringify(existing)) : {
    trous:0, cartons:0, a_monter:0, prix_manquants:0, plv_manquante:0, note:'', photoIds:[], type: state.mode,
  };
  state.draft.type = state.mode;
  state.screen = 'rayon-entry';
  render();
}

SCREENS['rayon-entry'] = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(h('button',{class:'back', onclick:()=>{ state.screen='home'; render(); }},['\u2190']));
  wrap.appendChild(h('h1',{class:'hero'},[state.activeRayon.label]));
  wrap.appendChild(h('p',{class:'sub'},[state.mode==='hebdo' ? 'Bilan hebdomadaire \u2014 sois exhaustif.' : 'Contr\u00F4le rapide.']));

  FIELDS.forEach(f=>{
    const block = h('div',{class:'counter-block'},[
      h('div',{class:'clabel'},[f.label, h('span',{class:'hint'},[' \u2014 '+f.hint])]),
      h('div',{class:'counter-row'},[
        h('button',{class:'cbtn', onclick:()=>{ state.draft[f.id]=Math.max(0,(state.draft[f.id]||0)-1); render(); }},['\u2212']),
        h('div',{class:'cval'},[String(state.draft[f.id]||0)]),
        h('button',{class:'cbtn', onclick:()=>{ state.draft[f.id]=(state.draft[f.id]||0)+1; render(); }},['+']),
      ])
    ]);
    wrap.appendChild(block);
  });

  const photoRow = h('div',{class:'photo-row'});
  (state.draft.photoIds||[]).forEach(pid=>{
    const img = h('img',{class:'photo-thumb', src:'', 'data-pid':pid});
    loadPhoto(pid).then(dataUrl=>{ if(dataUrl) img.src = dataUrl; });
    photoRow.appendChild(img);
  });
  const fileInput = h('input',{type:'file', accept:'image/*', capture:'environment', style:'display:none;', onchange: async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    showToast('Photo en cours...');
    const compressed = await compressImage(file);
    const pid = await savePhoto(state.currentUser.store, state.today, state.activeRayon.id, compressed);
    if(pid){ state.draft.photoIds = state.draft.photoIds||[]; state.draft.photoIds.push(pid); render(); }
  }});
  const addBtn = h('div',{class:'photo-add', onclick:()=>fileInput.click()},['\u{1F4F7}']);
  photoRow.appendChild(addBtn);
  photoRow.appendChild(fileInput);
  wrap.appendChild(h('div',{class:'field'},[h('label',{},['Photo (optionnel)']), photoRow]));

  wrap.appendChild(h('div',{class:'field'},[
    h('label',{},['Note (optionnel)']),
    h('textarea',{placeholder:'Un détail à signaler...', oninput:(e)=>{ state.draft.note = e.target.value; }},[state.draft.note||''])
  ]));

  const footer = h('div',{class:'footer-actions'},[
    h('button',{class:'btn btn-primary', onclick: async ()=>{
      state.draft.manager = state.currentUser.name;
      state.draft.ts = Date.now();
      state.currentEntries[state.activeRayon.id] = state.draft;
      await saveEntriesFor(state.currentUser.store, state.today, state.currentEntries);
      if(state.mode==='hebdo'){ state.weekStatus[state.today] = true; }
      showToast('Rayon validé');
      state.screen='home';
      render();
    }},['Valider ce rayon'])
  ]);

  const container = h('div',{},[wrap, footer]);
  const outer = h('div',{style:'display:flex;flex-direction:column;flex:1;'},[wrap, footer]);
  return outer;
};

SCREENS.report = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(topbar(true));
  wrap.appendChild(h('div',{style:'display:flex;align-items:center;justify-content:space-between;'},[
    h('h1',{class:'hero', style:'margin:0;'},['Rapport direction']),
    h('button',{class:'btn btn-ghost btn-sm', style:'width:auto;padding:8px 14px;', onclick: async ()=>{
      state.reportEntries = await loadEntriesFor(state.reportStore, state.reportDate);
      showToast('Actualisé');
      render();
    }},['\u21BB Actualiser'])
  ]));
  wrap.appendChild(h('p',{class:'sub', style:'margin-top:-8px;'},['Mise à jour automatique toutes les 15s']));

  const tabs = h('div',{class:'tabs'}, STORES.map(s=>h('button',{class:state.reportStore===s.id?'active':'', onclick: async ()=>{ state.reportStore=s.id; state.reportEntries = await loadEntriesFor(state.reportStore, state.reportDate); render(); }},[s.label])));
  wrap.appendChild(tabs);

  const dateField = h('div',{class:'field'},[
    h('label',{},['Date']),
    h('input',{type:'date', value:state.reportDate, onchange: async (e)=>{ state.reportDate = e.target.value; state.reportEntries = await loadEntriesFor(state.reportStore, state.reportDate); render(); }})
  ]);
  wrap.appendChild(dateField);

  const doneRayons = RAYONS.filter(r=>state.reportEntries[r.id]);
  const totalIssues = doneRayons.reduce((sum,r)=> sum + recTotal(state.reportEntries[r.id]), 0);

  const summary = h('div',{class:'progress-wrap'},[
    h('div',{class:'label'},[h('span',{},['Rayons contrôlés']), h('span',{},[`${doneRayons.length}/${RAYONS.length}`])]),
    h('div',{class:'progress-bar'},[h('div',{class:'progress-fill', style:`width:${(doneRayons.length/RAYONS.length)*100}%`})]),
    h('div',{style:'margin-top:10px;font-family:var(--font-mono);font-size:12px;color:var(--muted);'},[`${totalIssues} points signalés au total`])
  ]);
  wrap.appendChild(summary);

  const table = h('div',{class:'report-table'});
  const head = h('div',{class:'rt-head'},[h('div',{},['Rayon']), h('div',{class:'rt-cell'},['Trous']), h('div',{class:'rt-cell'},['Cartons']), h('div',{class:'rt-cell'},['\u00C0 monter']), h('div',{class:'rt-cell'},['Prix']), h('div',{class:'rt-cell'},['PLV'])]);
  table.appendChild(head);

  RAYONS.forEach(r=>{
    const rec = state.reportEntries[r.id];
    if(!rec){
      const row = h('div',{class:'rt-row', style:'opacity:0.45;'},[
        h('div',{class:'rn'},[r.label, h('div',{class:'rt-meta'},['Non contrôlé'])]),
        h('div',{class:'rt-cell zero'},['\u2013']), h('div',{class:'rt-cell zero'},['\u2013']), h('div',{class:'rt-cell zero'},['\u2013']), h('div',{class:'rt-cell zero'},['\u2013']), h('div',{class:'rt-cell zero'},['\u2013']),
      ]);
      table.appendChild(row);
      return;
    }
    const cell = (val)=>{
      const cls = val===0 ? 'zero' : (val<=2 ? '' : (val<=5?'warn':'danger'));
      return h('div',{class:'rt-cell '+cls},[String(val)]);
    };
    const row = h('div',{class:'rt-row'},[
      h('div',{class:'rn'},[r.label, h('div',{class:'rt-meta'},[`${rec.manager||'?'} \u00B7 ${rec.type==='hebdo'?'hebdo':'quotidien'}${(rec.photoIds&&rec.photoIds.length)?' \u00B7 \u{1F4F7}':''}${rec.note?' \u00B7 note':''}`])]),
      cell(rec.trous||0), cell(rec.cartons||0), cell(rec.a_monter||0), cell(rec.prix_manquants||0), cell(rec.plv_manquante||0),
    ]);
    table.appendChild(row);
  });
  wrap.appendChild(table);

  return wrap;
};

SCREENS.account = () => {
  const wrap = h('div',{class:'screen'});
  wrap.appendChild(h('button',{class:'back', onclick:()=>{ state.screen = state.currentUser.role==='direction' ? 'report' : 'home'; render(); }},['\u2190']));
  wrap.appendChild(h('h1',{class:'hero'},['Mon compte']));

  wrap.appendChild(h('div',{class:'field'},[
    h('label',{},['Pr\u00E9nom / nom']),
    h('input',{type:'text', value:state.editDraft.name, oninput:(e)=>{ state.editDraft.name=e.target.value; }})
  ]));
  wrap.appendChild(h('div',{class:'field'},[
    h('label',{},['Magasin']),
    h('select',{onchange:(e)=>{ state.editDraft.store=e.target.value; }}, STORES.map(s=>h('option',{value:s.id, selected:s.id===state.editDraft.store}, [s.label])))
  ]));
  wrap.appendChild(h('div',{class:'field'},[
    h('label',{},['R\u00F4le']),
    h('select',{onchange:(e)=>{ state.editDraft.role=e.target.value; }}, [
      h('option',{value:'manager', selected:state.editDraft.role==='manager'},['Responsable de magasin']),
      h('option',{value:'direction', selected:state.editDraft.role==='direction'},['Direction']),
    ])
  ]));

  wrap.appendChild(h('button',{class:'btn btn-primary', onclick: async ()=>{
    const idx = state.users.findIndex(u=>u.id===state.editDraft.id);
    if(idx>-1){ state.users[idx] = state.editDraft; await saveUsers(); }
    const roleChanged = state.currentUser.role !== state.editDraft.role;
    state.currentUser = state.editDraft;
    showToast('Profil mis \u00E0 jour');
    if(roleChanged){ await enterApp(); } else {
      state.screen = state.currentUser.role==='direction' ? 'report' : 'home';
      if(state.currentUser.role==='direction') startReportPolling();
      render();
    }
  }},['Enregistrer']));

  wrap.appendChild(h('button',{class:'btn btn-ghost', onclick:()=>{ stopReportPolling(); try{ localStorage.removeItem('tenueRayonsUserId'); }catch(e){} state.currentUser=null; state.screen='login'; render(); }},['Se d\u00E9connecter']));

  wrap.appendChild(h('button',{class:'btn btn-danger', onclick: async ()=>{
    state.users = state.users.filter(u=>u.id!==state.editDraft.id);
    await saveUsers();
    try{ localStorage.removeItem('tenueRayonsUserId'); }catch(e){}
    state.currentUser = null;
    showToast('Profil supprim\u00E9');
    state.screen='login';
    render();
  }},['Supprimer mon profil']));

  return wrap;
};

// ---------- INIT ----------
(async function init(){
  render();
  await loadUsers();
  let savedId = null;
  try{ savedId = localStorage.getItem('tenueRayonsUserId'); }catch(e){}
  const savedUser = savedId ? state.users.find(u => u.id === savedId) : null;
  if(savedUser){
    state.currentUser = savedUser;
    await enterApp();
  } else {
    state.screen = 'login';
    render();
  }
})();

</script>
</body>
</html>
